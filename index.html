<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS Short Video - Ultimate Platform</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --tiktok-pink: #fe2c55; --tiktok-cyan: #25f4ee; }
        body { margin: 0; background-color: #000; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; }
        .app-container { position: relative; width: 100%; max-width: 450px; height: 100vh; background: #000; display: flex; flex-direction: column; overflow: hidden; }
        .app-videos { width: 100%; height: calc(100% - 60px); scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .app-videos::-webkit-scrollbar { display: none; }
        .video-container { position: relative; width: 100%; height: 100%; scroll-snap-align: start; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* DOB Modal Styling */
        .dob-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .dob-box { background: #121214; padding: 25px; border-radius: 16px; width: 100%; max-width: 350px; text-align: center; border: 1px solid #222; }
        .dob-box h2 { font-size: 20px; margin-bottom: 10px; color: #fff; }
        .dob-box p { font-size: 13px; color: #aaa; margin-bottom: 20px; }
        .dob-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1e; color: #fff; font-size: 16px; text-align: center; margin-bottom: 20px; outline: none; }
        .dob-btn { background: var(--tiktok-pink); color: white; border: none; padding: 12px 30px; font-size: 15px; font-weight: bold; border-radius: 25px; cursor: pointer; width: 100%; }

        .bottom-app-bar { width: 100%; height: 60px; background: #000000; border-top: 0.5px solid #121212; display: flex; justify-content: space-around; align-items: center; z-index: 300; }
        .nav-item-btn { background: none; border: none; color: #8a8b8f; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 60px; }
        .nav-item-btn.active { color: #ffffff; }
        .tiktok-plus-container { position: relative; width: 46px; height: 30px; background: #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .tiktok-plus-container::before { content: ''; position: absolute; top: 0; left: -3px; width: 100%; height: 100%; background: var(--tiktok-cyan); border-radius: 8px; z-index: -1; }
        .tiktok-plus-container::after { content: ''; position: absolute; top: 0; right: -3px; width: 100%; height: 100%; background: var(--tiktok-pink); border-radius: 8px; z-index: -2; }
    </style>
</head>
<body>

    <div class="dob-overlay" id="dobVerificationModal">
        <div class="dob-box">
            <h2>अपनी जन्मतिथि चुनें 🎂</h2>
            <p>MS Shorts पर आगे बढ़ने ke liye कृपया अपनी Date of Birth दर्ज करें।</p>
            <input type="date" class="dob-input" id="userBirthDateField">
            <button class="dob-btn" onclick="verifyUserAgeGateLimit()">प्रवेश करें</button>
        </div>
    </div>

    <div class="app-container">
        <div class="main-panel-view"><div class="app-videos" id="videoFeedPipeline"></div></div>
        <div class="bottom-app-bar">
            <button class="nav-item-btn active"><span>🏠</span><span>Home</span></button>
            <button class="nav-item-btn"><span>👥</span><span>Friends</span></button>
            <div class="tiktok-plus-container" onclick="alert('कृपया पहले प्रोफाइल में जाकर मोबाइल नंबर/Google से लॉगिन करें!')"><div class="tiktok-plus-symbol">+</div></div>
            <button class="nav-item-btn"><span>💬</span><span>Inbox</span></button>
            <button class="nav-item-btn"><span>👤</span><span>Profile</span></button>
        </div>
    </div>

    <script>
        // 🔥 Aapki Firebase configuration ka sancha (Yahan apni keys aayengi)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "YOUR_AUTH_DOMAIN_HERE",
            projectId: "YOUR_PROJECT_ID_HERE",
            storageBucket: "YOUR_STORAGE_BUCKET_HERE",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID_HERE",
            appId: "YOUR_APP_ID_HERE"
        };
        
        // Initialize Firebase (Bina key ke test alert dega)
        if(firebaseConfig.apiKey !== "YOUR_API_KEY_HERE") {
            firebase.initializeApp(firebaseConfig);
        }

        // DOB Check Logic
        function verifyUserAgeGateLimit() {
            const inputDate = document.getElementById('userBirthDateField').value;
            if(!inputDate) {
                alert("कृपया सही तारीख चुनें!");
                return;
            }
            // Age Calculate karein
            const birthDate = new Date(inputDate);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }

            if(age < 13) {
                alert("माफ़ी चाहते हैं, इस प्लेटफॉर्म का इस्तेमाल करने के लिए आपकी उम्र कम से कम 13 वर्ष होनी चाहिए।");
            } else {
                // DOB lock karke screen hatayein
                localStorage.setItem('ms_user_dob', inputDate);
                document.getElementById('dobVerificationModal').style.display = 'none';
                initGlobalFeedPipeline();
            }
        }

        // Auto check if DOB already saved
        if(localStorage.getItem('ms_user_dob')) {
            document.getElementById('dobVerificationModal').style.display = 'none';
        }

        function initGlobalFeedPipeline() {
            document.getElementById('videoFeedPipeline').innerHTML = `
                <div class="video-container">
                    <video loop playsinline autoplay muted src="https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-sign-light-taking-a-selfie-42998-large.mp4"></video>
                </div>`;
        }
        
        if(localStorage.getItem('ms_user_dob')) { window.onload = initGlobalFeedPipeline; }
    </script>
</body>
</html>
