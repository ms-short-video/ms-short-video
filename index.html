<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS-SORT - Home</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root { --tiktok-pink: #fe2c55; --tiktok-cyan: #25f4ee; --panel-dark: #121214; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { background: #000; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; color: #fff; }
        
        .app-shell { position: relative; width: 100%; max-width: 450px; height: 100%; background: #000; display: flex; flex-direction: column; margin: 0 auto; }
        .video-viewport { width: 100%; height: calc(100% - 65px); position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .interaction-sidebar { position: absolute; right: 15px; bottom: 90px; display: flex; flex-direction: column; gap: 22px; z-index: 100; align-items: center; }
        .action-icon-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; font-size: 28px; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }
        .action-icon-btn span { font-size: 11px; font-weight: 600; margin-top: 4px; }
        
        /* Navigation Fixed at Bottom */
        .bottom-navigation-dock { width: 100%; height: 65px; background: rgba(0,0,0,0.95); border-top: 0.5px solid #1a1a22; display: flex; justify-content: space-around; align-items: center; position: absolute; bottom: 0; left: 0; z-index: 9999; }
        .dock-tab-btn { background: none; border: none; color: #a6a7ab; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 20%; text-decoration: none; }
        .dock-tab-btn.active { color: #ffffff; }
        
        .center-plus-trigger { position: relative; width: 45px; height: 28px; background: #fff; border-radius: 7px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .center-plus-trigger::before { content: ''; position: absolute; top: 0; left: -3px; width: 100%; height: 100%; background: var(--tiktok-cyan); border-radius: 7px; z-index: -1; }
        .center-plus-trigger::after { content: ''; position: absolute; top: 0; right: -3px; width: 100%; height: 100%; background: var(--tiktok-pink); border-radius: 7px; z-index: -2; }

        /* Integrated Custom Login Panel Popup */
        .fullscreen-gate { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); z-index: 10005; display: flex; flex-direction: column; justify-content: center; padding: 20px; }
        .gate-card { background: #111; padding: 25px; border-radius: 20px; width: 100%; border: 1px solid #222; }
        .system-input { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 12px; background: #222; color: white; font-size: 16px; outline: none; text-align: center; }
        .system-btn { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 12px; background: #ff0050; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        #statusLogger { text-align: center; font-size: 14px; color: #25f4ee; margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="video-viewport" id="videoViewportEngine"></div>
        
        <div class="interaction-sidebar">
            <button class="action-icon-btn" onclick="document.getElementById('likeCount').innerText='14.3K'">❤️ <span id="likeCount">14.2K</span></button>
            <button class="action-icon-btn" onclick="toggleGiftDrawer(true)">🎁 <span>Gifts</span></button>
            <button class="action-icon-btn" onclick="alert('Live Stream Queue Connecting...')">📡 <span style="color:var(--tiktok-pink)">LIVE</span></button>
        </div>

        <div class="bottom-navigation-dock">
            <a href="index.html" class="dock-tab-btn active"><span>🏠</span><span style="margin-top:4px;">Home</span></a>
            <button class="dock-tab-btn" onclick="handleWalletRoute()"><span>💰</span><span style="margin-top:4px;">Wallet</span></button>
            <div class="center-plus-trigger" onclick="handleUploadRoute()"><div style="color:#000; font-weight:800; font-size:20px;">+</div></div>
            <button class="dock-tab-btn" onclick="alert('Inbox is updated!')"><span>💬</span><span style="margin-top:4px;">Inbox</span></button>
            <button class="dock-tab-btn" id="profileTabBtn"><span>👤</span><span id="profileTabText" style="margin-top:4px;">Profile</span></button>
        </div>

        <div class="fullscreen-gate" id="authGate" style="display:none;">
            <div class="gate-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h1 style="font-size:24px; text-align:center; width:100%; color:#fff;">MS-SORT LOGIN</h1>
                    <button onclick="document.getElementById('authGate').style.display='none'" style="background:none; border:none; color:#fff; font-size:22px; cursor:pointer;">✕</button>
                </div>
                <input type="email" id="emailIn" class="system-input" placeholder="Enter Email">
                <input type="password" id="passIn" class="system-input" placeholder="Enter Password">
                <button class="system-btn" id="emailAuthBtn">LOGIN</button>
                <div id="statusLogger"></div>
                <button class="system-btn" id="googleAuthBtn" style="background:#fff; color:#000; margin-top:10px;">🌐 Sign In with Google</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC6Hvm7sNfG-2Z-caXGmzPc_iSQUL-Evxw", authDomain: "ms-sort-video-c38c4.firebaseapp.com", projectId: "ms-sort-video-c38c4", storageBucket: "ms-sort-video-c38c4.appspot.com", messagingSenderId: "570928313504", appId: "1:570928313504:web:7976dd9754fe1fa2e8c5c5" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let userInstance = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                userInstance = user;
                localStorage.setItem('auth_sync', 'true');
                document.getElementById('profileTabText').innerText = user.displayName ? user.displayName.split(' ')[0] : "Active";
            } else {
                userInstance = null;
                localStorage.removeItem('auth_sync');
                document.getElementById('profileTabText').innerText = "Profile";
            }
        });

        function handleUploadRoute() {
            if(localStorage.getItem('auth_sync')) window.location.href = "upload.html";
            else document.getElementById('authGate').style.display = 'flex';
        }
        
        function handleWalletRoute() {
            if(localStorage.getItem('auth_sync')) window.location.href = "wallet.html";
            else document.getElementById('authGate').style.display = 'flex';
        }

        document.getElementById('profileTabBtn').addEventListener('click', () => {
            if(!userInstance) document.getElementById('authGate').style.display = 'flex';
            else window.location.href = "wallet.html";
        });

        document.getElementById('googleAuthBtn').addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => location.reload()).catch(() => auth.signInWithRedirect(provider));
        });

        document.getElementById('emailAuthBtn').addEventListener('click', () => {
            const email = document.getElementById('emailIn').value.trim();
            const pass = document.getElementById('passIn').value;
            const logger = document.getElementById("statusLogger");
            if(!email || !pass) { alert("Fill all fields"); return; }
            
            logger.innerText = "Securing Identity Node... ⏳";
            auth.signInWithEmailAndPassword(email, pass).then(() => location.reload()).catch(() => {
                auth.createUserWithEmailAndPassword(email, pass).then(() => location.reload());
            });
        });

        window.onload = () => {
            const def = "https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-sign-light-taking-a-selfie-42998-large.mp4";
            const currentVideo = localStorage.getItem('ms_custom_video_feed') || def;
            document.getElementById('videoViewportEngine').innerHTML = `<video loop playsinline autoplay muted src="${currentVideo}"></video>`;
            const v = document.querySelector('video');
            if(v) document.body.addEventListener('click', () => v.muted = false, {once:true});
        };
    </script>
</body>
</html>
