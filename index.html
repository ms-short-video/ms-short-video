<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS LOGIN PANEL</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            box-sizing: border-box;
        }

        .loginBox {
            width: 90%;
            max-width: 400px;
            background: #111;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid transparent;
            border-radius: 12px;
            background: #222;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        
        input:focus {
            border-color: #ff0050;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            border: none;
            border-radius: 12px;
            background: #ff0050;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 0, 80, 0.2);
            transition: background 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        p {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }

        a {
            color: #ff0050;
            text-decoration: none;
            font-weight: 600;
        }
        
        #statusLogger {
            text-align: center;
            font-size: 14px;
            color: #25f4ee;
            margin-top: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="loginBox">
        <h1>MS LOGIN</h1>
        
        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">
        
        <button onclick="loginUser()">LOGIN</button>
        
        <div id="statusLogger"></div>

        <p>Don't have account? <a href="#" onclick="loginUser()">Sign Up Engine</a></p>
    </div>

    <script>
        // High-Quality Verified Firebase Bridge Credentials
        const firebaseConfig = {
            apiKey: "AIzaSyC6Hvm7sNfG-2Z-caXGmzPc_iSQUL-Evxw",
            authDomain: "ms-sort-video-c38c4.firebaseapp.com",
            projectId: "ms-sort-video-c38c4",
            storageBucket: "ms-sort-video-c38c4.appspot.com",
            messagingSenderId: "570928313504",
            appId: "1:570928313504:web:7976dd9754fe1fa2e8c5c5"
        };
        
        // Initialize Core Firebase Stack Node
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function loginUser() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const logger = document.getElementById("statusLogger");

            if(email === "" || password === "") {
                alert("Fill all fields");
                return;
            }
            if(password.length < 6) {
                alert("Password target sequence must be minimum 6 characters!");
                return;
            }

            logger.innerText = "Securing Identity Verification... ⏳";

            // Anti-Loop Dynamic Execution
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    localStorage.setItem('auth_sync_flag', 'true');
                    logger.innerText = "Authentication Success! Redirecting... 🎉";
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                })
                .catch((error) => {
                    // System checks if user does not exist, auto creates channel
                    if (error.code === 'auth/user-not-found') {
                        logger.innerText = "Creating Global New Account... 🚀";
                        auth.createUserWithEmailAndPassword(email, password)
                            .then(() => {
                                localStorage.setItem('auth_sync_flag', 'true');
                                logger.innerText = "Account Provisioned! Routing Home... ✨";
                                setTimeout(() => { window.location.href = "index.html"; }, 1000);
                            })
                            .catch(e => {
                                alert("Signup Fault: " + e.message);
                                logger.innerText = "";
                            });
                    } else {
                        alert("Error Stream Interrupt: " + error.message);
                        logger.innerText = "";
                    }
                });
        }
    </script>
</body>
</html>
