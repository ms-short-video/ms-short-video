<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS-SORT - Creative Studio</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root { --tiktok-pink: #fe2c55; --tiktok-cyan: #25f4ee; --glass-bg: rgba(22, 22, 26, 0.7); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: linear-gradient(135deg, #09090b 0%, #18181b 100%); height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; overflow: hidden; }
        .studio-shell { width: 100%; max-width: 450px; height: 100vh; background: rgba(0, 0, 0, 0.85); position: relative; padding: 24px; display: flex; flex-direction: column; border: 1px solid #27272a; }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; margin-top: 10px; }
        .back-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; text-decoration: none; }
        .studio-title { font-size: 20px; font-weight: 800; background: linear-gradient(to right, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .glass-drop-card { background: var(--glass-bg); border: 2px dashed #3f3f46; border-radius: 24px; padding: 50px 20px; text-align: center; cursor: pointer; backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .glass-drop-card:active { border-color: var(--tiktok-cyan); }
        
        .upload-glowing-circle { width: 70px; height: 70px; background: rgba(254, 44, 85, 0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; border: 1px solid rgba(254, 44, 85, 0.2); font-size: 32px; }
        .upload-main-text { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: #fff; }
        .upload-sub-text { font-size: 12px; color: #71717a; margin-bottom: 20px; }
        .browse-pill-btn { background: rgba(255,255,255,0.08); padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 600; display: inline-block; border: 1px solid rgba(255,255,255,0.1); }
        
        .studio-input-node { background: var(--glass-bg); border: 1px solid #27272a; border-radius: 14px; padding: 16px; width: 100%; color: #fff; font-size: 15px; margin-top: 20px; outline: none; }
        .publish-btn-engine { margin-top: auto; margin-bottom: 20px; background: linear-gradient(90deg, var(--tiktok-pink) 0%, #d91b4c 100%); color: #fff; border: none; padding: 16px; font-size: 16px; font-weight: 700; border-radius: 14px; cursor: pointer; width: 100%; box-shadow: 0 8px 24px rgba(254, 44, 85, 0.35); }
        #pulseStatus { text-align: center; font-size: 14px; font-weight: 600; color: var(--tiktok-cyan); margin-top: 15px; }
    </style>
</head>
<body>
    <div class="studio-shell">
        <div class="header-section">
            <a href="index.html" class="back-btn">←</a>
            <div class="studio-title">Upload Studio</div>
            <div style="width:20px;"></div>
        </div>

        <label for="videoFileSelector" class="glass-drop-card" id="dropCard">
            <div class="upload-glowing-circle">🎬</div>
            <div class="upload-main-text" id="pickerMainText">Select HD Short Video</div>
            <div class="upload-sub-text">MP4, MOV Formats</div>
            <div class="browse-pill-btn">Browse Files</div>
            <input type="file" id="videoFileSelector" accept="video/*" style="display:none;">
        </label>

        <input type="text" class="studio-input-node" placeholder="Write a catchy caption... #viral #ms_sort">
        
        <div id="pulseStatus"></div>
        <button class="publish-btn-engine" id="submitUploadActionBtn" style="display:none;">Publish to Feed</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC6Hvm7sNfG-2Z-caXGmzPc_iSQUL-Evxw", authDomain: "ms-sort-video-c38c4.firebaseapp.com", projectId: "ms-sort-video-c38c4", storageBucket: "ms-sort-video-c38c4.appspot.com", messagingSenderId: "570928313504", appId: "1:570928313504:web:7976dd9754fe1fa2e8c5c5" };
        firebase.initializeApp(firebaseConfig);

        let selectedFileAsset = null;
        const selector = document.getElementById('videoFileSelector');
        const submitBtn = document.getElementById('submitUploadActionBtn');
        const statusText = document.getElementById('pulseStatus');

        selector.addEventListener('change', (e) => {
            selectedFileAsset = e.target.files[0];
            if(selectedFileAsset) {
                document.getElementById('pickerMainText').innerText = selectedFileAsset.name.substring(0, 22) + "...";
                submitBtn.style.display = 'block';
                document.getElementById('dropCard').style.borderColor = "var(--tiktok-pink)";
            }
        });

        submitBtn.addEventListener('click', () => {
            if(!selectedFileAsset) return;
            submitBtn.style.display = 'none';
            statusText.innerText = "Processing Ultra-HD Transcoding Node... ⏳";

            const dataStream = new FormData();
            dataStream.append('file', selectedFileAsset);
            dataStream.append('upload_preset', 'ms_shorts_preset');

            fetch('https://api.cloudinary.com/v1_1/dxtv6f7zp/video/upload', { method: 'POST', body: dataStream })
            .then(res => res.json())
            .then(parsedRes => {
                if(parsedRes.secure_url) {
                    localStorage.setItem('ms_custom_video_feed', parsedRes.secure_url);
                    statusText.innerText = "Video Live Stream Ready! 🎉";
                    setTimeout(() => { window.location.href = "index.html"; }, 1200);
                } else {
                    alert("Error: " + parsedRes.error.message);
                    submitBtn.style.display = 'block';
                    statusText.innerText = "";
                }
            }).catch(() => { window.location.href = "index.html"; });
        });
    </script>
</body>
</html>
