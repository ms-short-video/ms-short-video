<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>MS SHORT VIDEO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
font-family:Arial;
overflow:hidden;
}

.reels{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.videoBox{
height:100vh;
position:relative;
scroll-snap-align:start;
}

video{
width:100%;
height:100%;
object-fit:cover;
background:black;
}

.info{
position:absolute;
bottom:100px;
left:15px;
color:white;
z-index:10;
}

.actions{
position:absolute;
right:15px;
bottom:120px;
display:flex;
flex-direction:column;
gap:20px;
color:white;
font-size:30px;
z-index:10;
}

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
color:white;
font-size:14px;
z-index:20;
}

.navBtn{
text-align:center;
cursor:pointer;
}

</style>

</head>

<body>

<div class="reels">

<div class="videoBox">

<video
src="https://www.w3schools.com/html/mov_bbb.mp4"
autoplay
muted
loop
playsinline>
</video>

<div class="info">

<h3>@ms_official</h3>

<p>🔥 MS Reel Video</p>

</div>

<div class="actions">

<div>❤️</div>

<div>💬</div>

<div>📤</div>

</div>

</div>

<div class="videoBox">

<video
src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
autoplay
muted
loop
playsinline>
</video>

<div class="info">

<h3>@ms_reels</h3>

<p>🎬 Trending Reel</p>

</div>

<div class="actions">

<div>❤️</div>

<div>💬</div>

<div>📤</div>

</div>

</div>

</div>

<div class="bottomNav">

<div class="navBtn">

🏠<br>Home

</div>

<div class="navBtn">

👥<br>Friends

</div>

<div
class="navBtn"
onclick="window.location.href='upload.html'">

➕<br>Upload

</div>

<div class="navBtn">

📥<br>Inbox

</div>

<div
class="navBtn"
onclick="window.location.href='wallet.html'">

👤<br>Profile

</div>

</div>

<script>

const videos =
document.querySelectorAll("video");

videos.forEach(video=>{

video.addEventListener(
"click",
()=>{

if(video.paused){

video.play();

}else{

video.pause();

}

});

});

</script>

</body>
</html>
