<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>MS Upload</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
padding:20px;
}

.container{

max-width:500px;
margin:auto;

}

h1{

text-align:center;
margin-bottom:30px;

}

.box{

background:#111;
padding:20px;
border-radius:20px;

}

input,textarea{

width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#222;
color:white;
font-size:16px;

}

button{

width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
background:#ff0050;
color:white;
font-size:18px;
font-weight:bold;

}

video{

width:100%;
margin-top:20px;
border-radius:15px;

}

#status{

margin-top:20px;
text-align:center;

}

</style>

</head>

<body>

<div class="container">

<h1>🎬 Upload Reel</h1>

<div class="box">

<input
type="file"
accept="video/*"
id="videoInput">

<textarea
id="caption"
placeholder="Write Caption">
</textarea>

<video
id="preview"
controls>
</video>

<button onclick="uploadVideo()">

UPLOAD VIDEO

</button>

<div id="status"></div>

</div>

</div>

<script>

const videoInput =
document.getElementById("videoInput");

const preview =
document.getElementById("preview");

videoInput.onchange = function(){

const file =
videoInput.files[0];

const url =
URL.createObjectURL(file);

preview.src = url;

};

async function uploadVideo(){

const file =
videoInput.files[0];

if(!file){

alert("Select Video");

return;

}

document.getElementById("status")
.innerHTML =
"Uploading...";

const data =
new FormData();

data.append(
"file",
file
);

data.append(
"upload_preset",
"ms_shorts_preset"
);

const res =
await fetch(
"https://api.cloudinary.com/v1_1/ddi4zfmo5/video/upload",
{
method:"POST",
body:data
}
);

const result =
await res.json();

document.getElementById("status")
.innerHTML =
"✅ Upload Success";

console.log(result);

alert(
"🔥 Video Uploaded"
);

}

</script>

</body>
</html>
