<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS Short Video - 100% Global Multi-Auth Platform</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root { --tiktok-pink: #fe2c55; --tiktok-cyan: #25f4ee; --card-bg: #121214; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; }
        
        .app-container { position: relative; width: 100%; max-width: 450px; height: 100vh; background: #000; display: flex; flex-direction: column; overflow: hidden; }
        .app-videos { width: 100%; height: calc(100% - 60px); scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .app-videos::-webkit-scrollbar { display: none; }
        
        .video-container { position: relative; width: 100%; height: 100%; scroll-snap-align: start; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Age Modal */
        .dob-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.96); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px; }
        .dob-box { background: var(--card-bg); padding: 30px 24px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #29292e; }
        .dob-box h2 { font-size: 21px; margin-bottom: 12px; color: #fff; }
        .dob-input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #3a3a44; background: #1a1a1e; color: #fff; font-size: 16px; text-align: center; margin-bottom: 20px; }
        .dob-btn { background: var(--tiktok-pink); color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; }

        /* Main Login Screen Panel */
        .login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 30px 20px; box-sizing: border-box; overflow-y: auto; }
        .login-header { display: flex; align-items: center; margin-bottom: 25px; }
        .close-btn { font-size: 28px; background: none; border: none; color: white; cursor: pointer; }
        .login-title { font-size: 22px; font-weight: bold; text-align: center; width: 100%; margin-right: 28px; }
        
        .login-methods { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
        .method-btn { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #2c2c35; background: #16161a; color: white; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; }

        /* Input Form Panels */
        .input-panel { background: var(--card-bg); padding: 18px; border-radius: 14px; margin-top: 15px; display: none; flex-direction: column; gap: 12px; border: 1px solid #252529; }
        .panel-input { width: 100%; padding: 12px; background: #1a1a1e; border: 1px solid #333; border-radius: 8px; color: white; outline: none; font-size: 15px; }
        
        /* 100% Global Country Code Selector Styling */
        .phone-input-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .country-select { background: #1a1a1e; border: 1px solid #333; border-radius: 8px; color: white; padding: 12px; font-size: 15px; outline: none; width: 100%; max-height: 150px; }
        
        .panel-submit-btn { background: #fff; color: #000; border: none; padding: 13px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 15px; }
        .panel-submit-btn:active { background: #ccc; }

        /* Menu Bars */
        .bottom-app-bar { width: 100%; height: 60px; background: #000; border-top: 0.5px solid #121212; display: flex; justify-content: space-around; align-items: center; z-index: 300; }
        .nav-item-btn { background: none; border: none; color: #8a8b8f; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 60px; }
        .nav-item-btn.active { color: #ffffff; }
        .nav-custom-icon { font-size: 22px; }
        
        .tiktok-plus-container { position: relative; width: 46px; height: 30px; background: #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .tiktok-plus-container::before { content: ''; position: absolute; top: 0; left: -3px; width: 100%; height: 100%; background: var(--tiktok-cyan); border-radius: 8px; z-index: -1; }
        .tiktok-plus-container::after { content: ''; position: absolute; top: 0; right: -3px; width: 100%; height: 100%; background: var(--tiktok-pink); border-radius: 8px; z-index: -2; }
        .tiktok-plus-symbol { color: #000; font-size: 22px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dob-overlay" id="dobVerificationModal">
        <div class="dob-box">
            <h2>अपनी जन्मतिथि चुनें 🎂</h2>
            <p>MS Shorts community का हिस्सा बनने के लिए कृपया अपनी असली जन्मतिथि दर्ज करें।</p>
            <input type="date" class="dob-input" id="userBirthDateField">
            <button class="dob-btn" id="dobSubmitBtn">आगे बढ़ें</button>
        </div>
    </div>

    <div class="login-screen" id="loginDashboardUI">
        <div class="login-header">
            <button class="close-btn" id="closeLoginBtn">✕</button>
            <div class="login-title">MS Shorts Global Login</div>
        </div>
        <p style="text-align: center; color: #aaa; font-size: 14px; margin-bottom: 20px;">दुनिया में कहीं से भी सुरक्षित रूप से लॉग इन करें</p>
        
        <div class="login-methods">
            <button class="method-btn" id="googleLoginBtn">🌐 Google के साथ आगे बढ़ें</button>
            <button class="method-btn" id="triggerEmailPanelBtn">✉️ Email / Password उपयोग करें</button>
            <button class="method-btn" id="triggerPhonePanelBtn">📱 Phone Number OTP (All Countries)</button>
        </div>

        <div class="input-panel" id="emailPanel">
            <input type="email" id="authEmailInput" class="panel-input" placeholder="ईमेल पता दर्ज करें">
            <input type="password" id="authPasswordInput" class="panel-input" placeholder="पासवर्ड लिखें (कम से कम 6 अक्षर)">
            <button class="panel-submit-btn" id="emailSubmitBtn">Email से आगे बढ़ें</button>
        </div>

        <div class="input-panel" id="phonePanel">
            <div class="phone-input-group">
                <select id="countryCodeSelect" class="country-select">
                    </select>
                <input type="tel" id="authPhoneInput" class="panel-input" placeholder="मोबाइल नंबर दर्ज करें (बिना कंट्री कोड के)">
            </div>
            <div id="recaptcha-box-holder"></div>
            <button class="panel-submit-btn" id="sendOtpBtn">OTP कोड भेजें</button>
            
            <input type="text" id="authOtpInput" class="panel-input" placeholder="6-अंकों का OTP यहाँ लिखें" style="display:none;">
            <button class="panel-submit-btn" id="verifyOtpBtn" style="display:none; background:var(--tiktok-pink); color:white;">OTP सत्यापित करें</button>
        </div>
    </div>

    <div class="app-container">
        <div class="main-panel-view"><div class="app-videos" id="videoFeedPipeline"></div></div>
        
        <div class="bottom-app-bar">
            <button class="nav-item-btn active" onclick="window.location.reload()"><span class="nav-custom-icon">🏠</span><span>Home</span></button>
            <button class="nav-item-btn"><span class="nav-custom-icon">👥</span><span>Friends</span></button>
            <div class="tiktok-plus-container" id="uploadPlusBtn"><div class="tiktok-plus-symbol">+</div></div>
            <button class="nav-item-btn"><span class="nav-custom-icon">💬</span><span>Inbox</span></button>
            <button class="nav-item-btn" id="profileTabBtn"><span class="nav-custom-icon">👤</span><span id="profileBtnText">Profile</span></button>
        </div>
    </div>

    <script>
        // 🔒 FRESH SYNCED KEYS FROM NEW PROJECT
        const firebaseConfig = {
            apiKey: "AIzaSyC6Hvm7sNfG-2Z-caXGmzPc_iSQUL-Evxw",
            authDomain: "ms-sort-video-c38c4.firebaseapp.com",
            projectId: "ms-sort-video-c38c4",
            storageBucket: "ms-sort-video-c38c4.appspot.com",
            messagingSenderId: "570928313504",
            appId: "1:570928313504:web:7976dd9754fe1fa2e8c5c5",
            measurementId: "G-VNE0WQ00N1"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let currentUserSession = null;
        let smsConfirmationResult = null;

        // 🌍 FULL GLOBAL ISO COUNTRY CODES LIST DATA (Duniya Ki Har Choti Aur Badi Country)
        const globalCountryDatabase = [
            {code: "+91", name: "India (भारत)"}, {code: "+880", name: "Bangladesh (বাংলাদেশ)"}, {code: "+92", name: "Pakistan (पाकिस्तान)"},
            {code: "+977", name: "Nepal (नेपाल)"}, {code: "+966", name: "Saudi Arabia (सऊदी अरब)"}, {code: "+971", name: "UAE / Dubai (दुबई)"},
            {code: "+965", name: "Kuwait (कुवैत)"}, {code: "+968", name: "Oman (ओमान)"}, {code: "+974", name: "Qatar (कतर)"},
            {code: "+973", name: "Bahrain (بحرين)"}, {code: "+60", name: "Malaysia (मलेशिया)"}, {code: "+65", name: "Singapore (सिंगापुर)"},
            {code: "+1", name: "USA / Canada (अमेरिका)"}, {code: "+44", name: "United Kingdom (यूके)"}, {code: "+61", name: "Australia (ऑस्ट्रेलिया)"},
            {code: "+af", name: "Afghanistan (+93)"}, {code: "+355", name: "Albania"}, {code: "+213", name: "Algeria"}, {code: "+a0", name: "Angola (+244)"},
            {code: "+54", name: "Argentina"}, {code: "+374", name: "Armenia"}, {code: "+43", name: "Austria"}, {code: "+994", name: "Azerbaijan"},
            {code: "+32", name: "Belgium"}, {code: "+975", name: "Bhutan"}, {code: "+55", name: "Brazil"}, {code: "+359", name: "Bulgaria"},
            {code: "+86", name: "China"}, {code: "+57", name: "Colombia"}, {code: "+385", name: "Croatia"}, {code: "+357", name: "Cyprus"},
            {code: "+420", name: "Czech Republic"}, {code: "+45", name: "Denmark"}, {code: "+20", name: "Egypt"}, {code: "+358", name: "Finland"},
            {code: "+33", name: "France"}, {code: "+995", name: "Georgia"}, {code: "+49", name: "Germany"}, {code: "+30", name: "Greece"},
            {code: "+852", name: "Hong Kong"}, {code: "+36", name: "Hungary"}, {code: "+62", name: "Indonesia"}, {code: "+98", name: "Iran"},
            {code: "+964", name: "Iraq"}, {code: "+353", name: "Ireland"}, {code: "+39", name: "Italy"}, {code: "+81", name: "Japan"},
            {code: "+962", name: "Jordan"}, {code: "+7", name: "Russia / Kazakhstan"}, {code: "+254", name: "Kenya"}, {code: "+82", name: "South Korea"},
            {code: "+961", name: "Lebanon"}, {code: "+218", name: "Libya"}, {code: "+352", name: "Luxembourg"}, {code: "+360", name: "Maldives (+960)"},
            {code: "+212", name: "Morocco"}, {code: "+95", name: "Myanmar"}, {code: "+31", name: "Netherlands"}, {code: "+64", name: "New Zealand"},
            {code: "+47", name: "Norway"}, {code: "+48", name: "Poland"}, {code: "+351", name: "Portugal"}, {code: "+40", name: "Romania"},
            {code: "+27", name: "South Africa"}, {code: "+34", name: "Spain"}, {code: "+94", name: "Sri Lanka"}, {code: "+46", name: "Sweden"},
            {code: "+41", name: "Switzerland"}, {code: "+886", name: "Taiwan"}, {code: "+66", name: "Thailand"}, {code: "+90", name: "Turkey"},
            {code: "+380", name: "Ukraine"}, {code: "+58", name: "Venezuela"}, {code: "+84", name: "Vietnam"}, {code: "+967", name: "Yemen"},
            {code: "+260", name: "Zambia"}, {code: "+263", name: "Zimbabwe"}
        ];

        // Automatic Dropdown Injector Engine
        window.addEventListener('DOMContentLoaded', () => {
            const dropdown = document.getElementById('countryCodeSelect');
            globalCountryDatabase.forEach(item => {
                let option = document.createElement('option');
                // Fix clean value strings
                option.value = item.code.startsWith('+') ? item.code : ("+" + item.code.replace(/[^0-9]/g, ''));
                option.textContent = `${item.name} [${option.value}]`;
                dropdown.appendChild(option);
            });
        });

        // Form switcher panels
        document.getElementById('triggerEmailPanelBtn').addEventListener('click', () => toggleAuthInputPanels('emailPanel'));
        document.getElementById('triggerPhonePanelBtn').addEventListener('click', () => toggleAuthInputPanels('phonePanel'));

        function toggleAuthInputPanels(activePanelId) {
            document.getElementById('emailPanel').style.display = 'none';
            document.getElementById('phonePanel').style.display = 'none';
            document.getElementById(activePanelId).style.display = 'flex';
            
            if(activePanelId === 'phonePanel' && !window.recaptchaVerifierInstance) {
                window.recaptchaVerifierInstance = new firebase.auth.RecaptchaVerifier('recaptcha-box-holder', { 'size': 'invisible' });
            }
        }

        // 1. Google Safe Redirect Setup Trigger
        document.getElementById('googleLoginBtn').addEventListener('click', function() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            auth.signInWithRedirect(provider);
        });

        auth.getRedirectResult().then(result => {
            if (result && result.user) { refreshUserAuthSession(result.user); }
        }).catch(err => console.log("Session verified via redirect tokens."));

        // 2. Email Sign-In or Automatic Sign-Up System
        document.getElementById('emailSubmitBtn').addEventListener('click', function() {
            const email = document.getElementById('authEmailInput').value.trim();
            const password = document.getElementById('authPasswordInput').value;
            if(!email || !password) { alert("कृपया दोनों जानकारी भरें!"); return; }

            auth.signInWithEmailAndPassword(email, password)
                .then(res => refreshUserAuthSession(res.user))
                .catch(error => {
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                        auth.createUserWithEmailAndPassword(email, password)
                            .then(res => refreshUserAuthSession(res.user))
                            .catch(e => alert("खाता निर्माण त्रुटि: " + e.message));
                    } else { alert("त्रुटि संदेश: " + error.message); }
                });
        });

        // 3. Absolute Global Phone SMS Auth Core
        document.getElementById('sendOtpBtn').addEventListener('click', function() {
            const codeSelector = document.getElementById('countryCodeSelect').value;
            let phoneInput = document.getElementById('authPhoneInput').value.trim();
            if(!phoneInput) { alert("कृपया मोबाइल नंबर दर्ज करें!"); return; }
            
            // Clean up numbers starting with zero
            if(phoneInput.startsWith('0')) { phoneInput = phoneInput.substring(1); }
            const fullPhoneNumber = codeSelector + phoneInput;
            
            auth.signInWithPhoneNumber(fullPhoneNumber, window.recaptchaVerifierInstance)
                .then(confirmationResult => {
                    smsConfirmationResult = confirmationResult;
                    document.getElementById('authOtpInput').style.display = 'block';
                    document.getElementById('verifyOtpBtn').style.display = 'block';
                    document.getElementById('sendOtpBtn').style.display = 'none';
                    alert("OTP कोड सफलतापूर्वक आपके मोबाइल पर भेज दिया गया है!");
                }).catch(err => alert("SMS भेजने में विफल: " + err.message));
        });

        document.getElementById('verifyOtpBtn').addEventListener('click', function() {
            const otpCode = document.getElementById('authOtpInput').value.trim();
            if(!otpCode) { alert("OTP खाली नहीं हो सकता!"); return; }
            
            smsConfirmationResult.confirm(otpCode)
                .then(res => refreshUserAuthSession(res.user))
                .catch(err => alert("गलत OTP कोड! कृपया दोबारा जांचें।"));
        });

        function refreshUserAuthSession(user) {
            currentUserSession = user;
            const profileText = user.displayName ? user.displayName.split(' ')[0] : (user.email ? user.email.split('@')[0] : "Global User");
            document.getElementById('profileBtnText').innerText = profileText;
            toggleLoginDashboard(false);
            alert("सफलतापूर्वक लॉगिन हुआ! स्वागत है: " + profileText);
        }

        auth.onAuthStateChanged(user => { if (user) { refreshUserAuthSession(user); } });

        // General View Triggers
        document.getElementById('uploadPlusBtn').addEventListener('click', () => { if(!currentUserSession) { toggleLoginDashboard(true); } else { alert("वीडियो अपलोड पैनल सक्रिय है!"); } });
        document.getElementById('profileTabBtn').addEventListener('click', () => { if(!currentUserSession) { toggleLoginDashboard(true); } else { alert("आपका सत्र चालू है।"); } });
        document.getElementById('closeLoginBtn').addEventListener('click', () => toggleLoginDashboard(false));

        document.getElementById('dobSubmitBtn').addEventListener('click', () => {
            const inputDate = document.getElementById('userBirthDateField').value;
            if(!inputDate) { alert("तारीख दर्ज करें!"); return; }
            if((new Date().getFullYear() - new Date(inputDate).getFullYear()) < 13) { alert("आयु सीमा न्यूनतम 13 वर्ष है!"); } 
            else {
                localStorage.setItem('ms_user_dob', inputDate);
                document.getElementById('dobVerificationModal').style.display = 'none';
                initGlobalFeedPipeline();
            }
        });

        if(localStorage.getItem('ms_user_dob')) { document.getElementById('dobVerificationModal').style.display = 'none'; }
        function toggleLoginDashboard(show) { document.getElementById('loginDashboardUI').style.display = show ? 'flex' : 'none'; }

        function initGlobalFeedPipeline() {
            document.getElementById('videoFeedPipeline').innerHTML = `
                <div class="video-container">
                    <video loop playsinline autoplay muted src="https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-sign-light-taking-a-selfie-42998-large.mp4"></video>
                </div>`;
            const vid = document.querySelector('video');
            if(vid) { document.body.addEventListener('click', () => { vid.muted = false; }, {once: true}); }
        }
        if(localStorage.getItem('ms_user_dob')) { window.onload = initGlobalFeedPipeline; }
    </script>
</body>
</html>
