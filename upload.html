<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Upload Reel</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
padding:20px;
}

.container{

max-width:500px;
margin:auto;

}

h1{

text-align:center;
margin-bottom:30px;

}

.uploadBox{

background:#111;
padding:20px;
border-radius:20px;

}

input,textarea{

width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#222;
color:white;
font-size:16px;

}

button{

width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
background:#ff0050;
color:white;
font-size:18px;
font-weight:bold;

}

video{

width:100%;
margin-top:20px;
border-radius:15px;

}

</style>

</head>

<body>

<div class="container">

<h1>🎬 Upload Reel</h1>

<div class="uploadBox">

<input
type="file"
accept="video/*"
id="videoInput">

<textarea
id="caption"
placeholder="Write Caption">
</textarea>

<video
id="preview"
controls>
</video>

<button onclick="uploadVideo()">

UPLOAD VIDEO

</button>

</div>

</div>

<script>

const videoInput =
document.getElementById("videoInput");

const preview =
document.getElementById("preview");

videoInput.onchange = function(){

const file =
videoInput.files[0];

const url =
URL.createObjectURL(file);

preview.src = url;

};

function uploadVideo(){

alert(
"✅ Video Upload System Ready"
);

}

</script>

</body>
</html>
