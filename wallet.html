<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>MS Profile</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
}

.profile{

padding:20px;
text-align:center;

}

.profile img{

width:100px;
height:100px;
border-radius:50%;
margin-top:20px;

}

.username{

font-size:25px;
margin-top:15px;
font-weight:bold;

}

.bio{

color:gray;
margin-top:10px;

}

.stats{

display:flex;
justify-content:center;
gap:40px;
margin-top:25px;

}

.stat h2{

margin:0;

}

button{

margin-top:25px;
padding:12px 30px;
border:none;
border-radius:10px;
background:#ff0050;
color:white;
font-size:16px;
font-weight:bold;

}

.videoGrid{

display:grid;
grid-template-columns:1fr 1fr;
gap:5px;
padding:10px;
margin-top:30px;

}

.videoGrid video{

width:100%;
height:250px;
object-fit:cover;

}

</style>

</head>

<body>

<div class="profile">

<img
src="https://i.imgur.com/6VBx3io.png">

<div class="username">

@ms_official

</div>

<div class="bio">

🔥 MS SHORT VIDEO CREATOR

</div>

<div class="stats">

<div class="stat">

<h2>120</h2>

<p>Following</p>

</div>

<div class="stat">

<h2>5K</h2>

<p>Followers</p>

</div>

<div class="stat">

<h2>30K</h2>

<p>Likes</p>

</div>

</div>

<button onclick="loginUser()">

LOGIN

</button>

</div>

<div class="videoGrid">

<video
src="https://www.w3schools.com/html/mov_bbb.mp4"
controls>
</video>

<video
src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
controls>
</video>

</div>

<script>

function loginUser(){

alert(
"✅ Login System Coming Soon"
);

}

</script>

</body>
</html>
